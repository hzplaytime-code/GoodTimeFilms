<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一时一刻 GOOD TIME FILMS — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    color: #dde4ee;
    min-height: 100%;
    font-family: 'Futura', 'Century Gothic', sans-serif;
  }

  .grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 100;
    opacity: 0.03;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 80px 32px 80px;
  }

  header {
    margin-bottom: 64px;
  }

  .zh {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing: 0.05em;
    color: #dde4ee;
    display: block;
    margin-bottom: 6px;
  }

  .en {
    font-size: clamp(10px, 1.6vw, 13px);
    letter-spacing: 0.45em;
    color: rgba(221,228,238,0.4);
    text-transform: uppercase;
  }

  .rule {
    width: 100%;
    height: 0.5px;
    background: rgba(221,228,238,0.15);
    margin-bottom: 48px;
  }

  .versions {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .version-link {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 0.5px solid rgba(221,228,238,0.08);
    text-decoration: none;
    color: #dde4ee;
    transition: opacity 0.2s;
  }

  .version-link:hover { opacity: 0.5; }

  .version-label {
    font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .version-desc {
    font-size: clamp(10px, 1.4vw, 11px);
    letter-spacing: 0.15em;
    color: rgba(221,228,238,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#noise)">
    <animate attributeName="x" values="0;-5%;3%;0" dur="0.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="0;3%;-5%;0" dur="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>

<div class="wrap">
  <header>
    <span class="zh">一时一刻</span>
    <span class="en">Good Time Films — Logo Explorations</span>
  </header>

  <div class="rule"></div>

  <div class="versions">
    <a class="version-link" href="goodtimefilms_v1_3.html" target="_blank">
      <span class="version-label">V1.3</span>
      <span class="version-desc">Seal block</span>
    </a>
    <a class="version-link" href="goodtimefilms_v2_final.html" target="_blank">
      <span class="version-label">V2</span>
      <span class="version-desc">2×2 square — 时 outline</span>
    </a>
    <a class="version-link" href="goodtimefilms_v2.1_3.html" target="_blank">
      <span class="version-label">V2.1</span>
      <span class="version-desc">2×2 square — purple rectangle</span>
    </a>
    <a class="version-link" href="goodtimefilms_v2.1_5.html" target="_blank">
      <span class="version-label">V2.1.5</span>
      <span class="version-desc">2×2 square — purple rectangle 1.85:1</span>
    </a>
    <a class="version-link" href="goodtimefilms_v3.html" target="_blank">
      <span class="version-label">V3</span>
      <span class="version-desc">2×2 square — 时刻 diagonal ghost</span>
    </a>
    <a class="version-link" href="goodtimefilms_v3s.html" target="_blank">
      <span class="version-label">V3S</span>
      <span class="version-desc">V3 — purple S in FILMS</span>
    </a>
    <a class="version-link" href="goodtimefilms_v4_s.html" target="_blank">
      <span class="version-label">V4S</span>
      <span class="version-desc">V4 — subtle purple S in FILMS</span>
    </a>
  </div>
</div>

</body>
</html>
